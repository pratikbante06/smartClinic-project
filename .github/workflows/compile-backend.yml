name: Compile Backend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cms
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile backend
        working-directory: ./app
        run: ./mvnw compile -B

      - name: Run tests
        working-directory: ./app
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/cms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/cms
          JWT_SECRET: SmartClinicSecretKey2024XYZABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh
        run: ./mvnw test -B

      - name: Build JAR
        working-directory: ./app
        run: ./mvnw package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: app/target/*.jar
          retention-days: 7

      - name: Build Docker image
        working-directory: ./app
        run: docker build -t smartclinic-app .
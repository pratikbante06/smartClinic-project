<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patient Portal — Hospital CMS</title>
<link rel="icon" href="/assets/images/logo/logo.png">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page">
  <div id="navbar"></div>
  <div class="page-body">
    <h2 class="page-title">Find a <span>Doctor</span></h2>
    <div class="controls">
      <input type="text" id="search" placeholder="Search by name…" oninput="loadDoctors()">
      <select id="specialty" onchange="loadDoctors()">
        <option value="">All Specialties</option>
        <option>Cardiologist</option><option>Neurologist</option><option>Orthopedist</option>
        <option>Pediatrician</option><option>Dermatologist</option><option>General Physician</option>
      </select>
    </div>
    <div id="doctorsGrid" class="doctors-grid"><p style="color:#64748b">Loading doctors…</p></div>
  </div>
  <div id="footer"></div>
</div>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('bookModal')">×</button>
    <h2>Book <span>Appointment</span></h2>
    <div class="form-group"><label>Patient Name</label><input type="text" id="bkPatient" disabled></div>
    <div class="form-group"><label>Doctor</label><input type="text" id="bkDoctor" disabled></div>
    <div class="form-group"><label>Date</label><input type="date" id="bkDate"></div>
    <div class="form-group"><label>Time Slot</label>
      <select id="bkTime"><option value="">Select a slot</option></select></div>
    <div id="bkErr" class="form-error"></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="confirmBook()">Confirm Booking</button>
      <button class="btn btn-secondary" onclick="closeModal('bookModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('loginModal')">×</button>
    <h2>Patient <span>Login</span></h2>
    <div class="form-group"><label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••"></div>
    <div id="loginErr" class="form-error"></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="doPatientLogin()">Login</button>
      <button class="btn btn-secondary" onclick="closeModal('loginModal');openModal('signupModal')">No account? Sign up</button>
    </div>
  </div>
</div>

<!-- Signup Modal -->
<div class="modal-overlay" id="signupModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('signupModal')">×</button>
    <h2>Patient <span>Sign Up</span></h2>
    <div class="form-group"><label>Full Name</label><input type="text" id="sigName" placeholder="John Smith"></div>
    <div class="form-group"><label>Email</label><input type="email" id="sigEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="sigPassword" placeholder="••••••••"></div>
    <div class="form-group"><label>Phone</label><input type="text" id="sigPhone" placeholder="9876543210"></div>
    <div class="form-group"><label>Address</label><input type="text" id="sigAddress" placeholder="123 Main St"></div>
    <div id="sigErr" class="form-error"></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="doSignup()">Create Account</button>
      <button class="btn btn-secondary" onclick="closeModal('signupModal');openModal('loginModal')">Already have an account?</button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
// BUG FIX: If patient is already logged in redirect immediately
const isLogged = !!getToken() && getRole() === 'patient';
if (isLogged) { location.href = '/pages/loggedPatientDashboard.html'; }

renderNavbar(isLogged ? 'patient' : '');
renderFooter();

let selectedDoctor = null;
let patientInfo = null;

// BUG FIX: Load patient info if logged in (was missing — confirmBook() would fail
// with "Patient info not loaded" because patientInfo was never fetched on this page)
async function init() {
  if (isLogged) {
    const { ok, data } = await api('GET', '/api/patient/get');
    if (ok) patientInfo = data;
  }
  loadDoctors();
}

async function loadDoctors() {
  const name = document.getElementById('search').value.trim();
  const sp   = document.getElementById('specialty').value;
  let url = '/api/doctor/all';
  if (name || sp) {
    const p = new URLSearchParams();
    if (name) p.append('name', name);
    if (sp)   p.append('specialty', sp);
    url = '/api/doctor/search?' + p;
  }
  const { ok, data } = await api('GET', url);
  const grid = document.getElementById('doctorsGrid');
  if (!ok || !Array.isArray(data) || !data.length) {
    grid.innerHTML='<p style="color:#64748b;padding:20px">No doctors found.</p>'; return;
  }
  grid.innerHTML = data.map(d => `
    <div class="doctor-card">
      <div class="doctor-card-body">
        <h3>${d.name}</h3>
        <p class="specialty">🩺 ${d.specialty}</p>
        <p class="email">✉️ ${d.email}</p>
        <p class="times">🕐 ${(d.availableTimes||[]).join(' | ') || 'N/A'}</p>
      </div>
      <div class="doctor-card-footer">
        <button onclick='bookNow(${JSON.stringify(d)})'>Book Now</button>
      </div>
    </div>`).join('');
}

function bookNow(doctor) {
  // BUG FIX: Prompt login if not logged in; don't attempt booking
  if (!isLogged) { openModal('loginModal'); return; }
  selectedDoctor = doctor;
  document.getElementById('bkPatient').value = patientInfo ? patientInfo.name : '…';
  document.getElementById('bkDoctor').value  = doctor.name;
  document.getElementById('bkDate').value = '';
  const sel = document.getElementById('bkTime');
  sel.innerHTML = '<option value="">Select a slot</option>';
  (doctor.availableTimes || []).forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o);
  });
  document.getElementById('bkErr').textContent = '';
  openModal('bookModal');
}

async function confirmBook() {
  const date = document.getElementById('bkDate').value;
  const time = document.getElementById('bkTime').value;
  const errEl = document.getElementById('bkErr');
  if (!date || !time) { errEl.textContent = 'Select date and time'; return; }
  if (!patientInfo || !patientInfo.id) { errEl.textContent = 'Patient info not loaded. Please refresh and log in again.'; return; }
  const startTime = time.split('-')[0].trim();
  const body = {
    doctor: { id: selectedDoctor.id },
    patient: { id: patientInfo.id },
    appointmentDate: date,
    appointmentTime: startTime + ':00',
    status: 0
  };
  const { ok, data } = await api('POST', '/api/appointment/book', body);
  if (ok) { closeModal('bookModal'); alert('Appointment booked successfully!'); }
  else errEl.textContent = data.message || 'Booking failed';
}

async function doPatientLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('loginErr');
  if (!email || !pass) { errEl.textContent = 'Fill in all fields'; return; }
  errEl.textContent = '';
  const { ok, data } = await api('POST', '/api/patient/login', { email, password: pass });
  if (ok && data.token) {
    localStorage.setItem('token', data.token);
    // BUG FIX: also store patientId returned by login for quick access
    localStorage.setItem('patientId', data.patientId);
    setRole('patient');
    location.href = '/pages/loggedPatientDashboard.html';
  } else {
    errEl.textContent = data.message || 'Invalid credentials';
  }
}

async function doSignup() {
  const body = {
    name:     document.getElementById('sigName').value.trim(),
    email:    document.getElementById('sigEmail').value.trim(),
    password: document.getElementById('sigPassword').value.trim(),
    phone:    document.getElementById('sigPhone').value.trim(),
    address:  document.getElementById('sigAddress').value.trim(),
  };
  const errEl = document.getElementById('sigErr');
  if (!body.name || !body.email || !body.password || !body.phone || !body.address) {
    errEl.textContent = 'Fill in all fields'; return;
  }
  // BUG FIX: Basic email format validation before hitting backend
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(body.email)) {
    errEl.textContent = 'Please enter a valid email address'; return;
  }
  // BUG FIX: Basic phone validation (digits only, 7-15 chars)
  if (!/^\d{7,15}$/.test(body.phone)) {
    errEl.textContent = 'Phone must be 7-15 digits'; return;
  }
  errEl.textContent = '';
  const { ok, data } = await api('POST', '/api/patient/register', body);
  if (ok) {
    closeModal('signupModal');
    openModal('loginModal');
    // BUG FIX: Pre-fill login email after signup so user doesn't have to retype
    document.getElementById('loginEmail').value = body.email;
    document.getElementById('loginErr').textContent = '';
    alert('Registered successfully! Please log in.');
  } else {
    errEl.textContent = data.message || 'Registration failed';
  }
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — Hospital CMS</title>
<link rel="icon" href="/assets/images/logo/logo.png">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 16px;
  background:url('/assets/images/defineRole/index.png') center/cover no-repeat,
  linear-gradient(135deg,#ccfbf1,#e0f2fe);background-blend-mode:overlay}
</style>
</head>
<body>
<div class="page">
  <div id="navbar"></div>
  <div class="hero">
    <div class="form-card">
      <h2>Admin <span>Login</span></h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="err" class="form-error"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="doLogin()">Login as Admin</button>
        <button class="btn btn-secondary" onclick="location.href='/'">← Back</button>
      </div>
    </div>
  </div>
  <div id="footer"></div>
</div>
<script src="/js/shared.js"></script>
<script>
renderNavbar(''); renderFooter();
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('err');
  if (!u || !p) { err.textContent = 'Please fill in all fields'; return; }
  err.textContent = '';
  const { ok, data } = await api('POST', '/api/admin/login', { username: u, password: p });
  if (ok && data.token) {
    localStorage.setItem('token', data.token);
    setRole('admin');
    location.href = '/adminDashboard/' + data.token;
  } else {
    err.textContent = data.message || 'Invalid credentials';
  }
}
</script>
</body>
</html>

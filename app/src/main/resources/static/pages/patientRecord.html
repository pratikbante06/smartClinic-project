<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patient Record — Hospital CMS</title>
<link rel="icon" href="/assets/images/logo/logo.png">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="page">
  <div id="navbar"></div>
  <div class="page-body">
    <h2 class="page-title">Patient <span>Record</span></h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Date</th><th>Time</th><th>Appointment ID</th><th>Status</th><th>Prescription</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" style="text-align:center;color:#64748b;padding:24px">Loading…</td></tr></tbody>
      </table>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-secondary" onclick="history.back()">← Back</button>
    </div>
  </div>
  <div id="footer"></div>
</div>
<script src="/js/shared.js"></script>
<script>
renderNavbar('doctor'); renderFooter();
const q = new URLSearchParams(location.search);
const patientId = q.get('id');

async function load() {
  const { ok, data } = await api('GET', '/api/appointment/patient/' + patientId);
  const tb = document.getElementById('tbody');
  if (!ok || !Array.isArray(data) || !data.length) {
    tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:#64748b;padding:24px">No records found.</td></tr>'; return;
  }
  tb.innerHTML = data.map(a => `
    <tr>
      <td>${a.appointmentDate}</td>
      <td>${a.appointmentTime}</td>
      <td>${a.id}</td>
      <td><span class="badge ${a.status===0?'badge-pending':'badge-done'}">${a.status===0?'Upcoming':'Completed'}</span></td>
      <td>
        <a href="/pages/addPrescription.html?appointmentId=${a.id}&patientId=${a.patientId}&patientName=${encodeURIComponent(a.patientName||'')}${a.status===1?'&mode=view':''}">
          <img src="/assets/images/addPrescriptionIcon/addPrescription.png" style="width:28px;height:28px;cursor:pointer"
               title="${a.status===1?'View Prescription':'Add Prescription'}">
        </a>
      </td>
    </tr>`).join('');
}
load();
</script>
</body>
</html>
